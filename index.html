    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "How do I apply for the Ascend Mentorship Program in Kenya?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Visit ascendprogram.co.ke/apply and complete the free online application form. It takes about 10 minutes. Cohort 5 applications are currently open."
          }
        },
        {
          "@type": "Question",
          "name": "Is the Ascend Programme free?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. The Ascend Mentorship Programme is completely free for mentees. Applications are open to students, graduates, and young professionals across Kenya and Africa."
          }
        },
        {
          "@type": "Question",
          "name": "What is the Ascend Career Building Blocks programme?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Career Building Blocks is Ascend's flagship Level 1 programme — a 6-month structured mentorship and professional development journey with monthly virtual sessions, orientation, and graduation."
          }
        },
        {
          "@type": "Question",
          "name": "Who founded the Ascend Mentorship Program?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Ascend was founded in 2021 by Carolyne Mutambo, a seasoned mentor and leadership development practitioner based in Nairobi, Kenya."
          }
        }
      ]
    }
